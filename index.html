let current=0;
const tabs=document.getElementById(`tabs`),content=document.getElementById(`content`);
DAYS.forEach(d=>{const b=document.createElement(`button`);b.type=`button`;b.className=`tab${d.id===0?` active`:``}`;b.dataset.id=d.id;b.textContent=d.label;tabs.appendChild(b);});
function go(id){current=id;tabs.querySelectorAll(`.tab`).forEach(t=>t.classList.toggle(`active`,Number(t.dataset.id)===id));const d=DAYS.find(x=>x.id===id);content.innerHTML=id===0?overview():dayView(d);showMap(id);window.scrollTo({top:document.getElementById(`map`).offsetTop,behavior:`smooth`});const active=tabs.querySelector(`[data-id="${id}"]`);if(active)active.scrollIntoView({behavior:`smooth`,inline:`center`,block:`nearest`});}
tabs.addEventListener(`click`,e=>{const b=e.target.closest(`.tab`);if(b)go(Number(b.dataset.id));});
function toggleDetail(e,id){e.stopPropagation();const el=document.getElementById(id);if(!el)return;el.classList.toggle(`open`);e.currentTarget.textContent=el.classList.contains(`open`)?`收起执行细节 ↑`:`展开执行细节 ↓`;}

let sheetReturnFocus=null,sheetHideTimer=null;
function setBackgroundInert(on){[`map`,`tabs`,`content`].forEach(id=>{const el=document.getElementById(id);if(!el)return;if(on)el.setAttribute(`inert`,``);else el.removeAttribute(`inert`);});}
function openSheet(key){
  const loc=LOCS[key];if(!loc)return;
  const query=loc.amapKeyword||`${loc.name} ${loc.city||``}`.trim();
  const apple=loc.lat!=null?`https://maps.apple.com/?q=${encodeURIComponent(query)}&ll=${loc.lat},${loc.lng}`:`https://maps.apple.com/?q=${encodeURIComponent(query)}`;
  const osm=loc.lat!=null?`https://www.openstreetmap.org/?mlat=${loc.lat}&mlon=${loc.lng}#map=16/${loc.lat}/${loc.lng}`:``;
  const options=document.getElementById(`sheetOptions`);options.innerHTML=`<div class="sheet-title">${esc(loc.name)}</div><a class="sheet-item" href="${esc(amapUrl(loc))}" target="_blank" rel="noopener">高德地图 · 按中文地点搜索</a><a class="sheet-item" href="${esc(apple)}" target="_blank" rel="noopener">Apple 地图</a>${osm?`<a class="sheet-item" href="${esc(osm)}" target="_blank" rel="noopener">OpenStreetMap 坐标</a>`:``}`;
  const w=document.getElementById(`sheetWrap`);if(sheetHideTimer)clearTimeout(sheetHideTimer);sheetReturnFocus=document.activeElement;w.hidden=false;w.removeAttribute(`inert`);w.setAttribute(`aria-hidden`,`false`);setBackgroundInert(true);document.body.style.overflow=`hidden`;requestAnimationFrame(()=>w.classList.add(`show`));setTimeout(()=>options.querySelector(`.sheet-item`)?.focus(),40);
}
function closeSheet(){
  const w=document.getElementById(`sheetWrap`);w.classList.remove(`show`);w.setAttribute(`aria-hidden`,`true`);setBackgroundInert(false);document.body.style.overflow=``;sheetHideTimer=setTimeout(()=>{w.hidden=true;w.setAttribute(`inert`,``);},230);if(sheetReturnFocus&&typeof sheetReturnFocus.focus===`function`)sheetReturnFocus.focus();sheetReturnFocus=null;
}
document.getElementById(`sheetWrap`).addEventListener(`click`,e=>{if(e.target.id===`sheetWrap`)closeSheet();});
document.addEventListener(`keydown`,e=>{if(e.key===`Escape`)closeSheet();});

initMap();go(0);
